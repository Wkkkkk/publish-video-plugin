# Copy to watcher.toml and edit. Secrets do NOT go here — S3/MyTV creds come from
# the environment (.env), cookies come from your browser (cookies_browser below).

poll_interval_mins = 60        # loop mode only; ignored with --once
transcode = false              # re-encode non-H.264/AAC inputs before upload
max_items = 10                 # only the N latest items per source each pass (0 = no cap)
concurrency = 5                # how many videos to download/upload at once
concurrent_fragments = 4       # yt-dlp -N: parallel fragment downloads per video
cookies_browser = "chrome"     # browser yt-dlp reads cookies from (Watch Later is private)
state_path = "~/.publish-video-watcher/state.json"  # dedup record; never your source

# NOTE: naming any [platforms.*] section replaces the whole platforms table, so list
# every platform you want polled. Omit one to skip it.
[platforms.youtube]
source = "watch_later"         # or a full playlist/folder URL, e.g.
                               # "https://www.youtube.com/playlist?list=PLxxxx"

[platforms.bilibili]
source = "watch_later"         # or a full favorites-folder URL

# Per-video actions run in order for each newly-published video. None built in for v1;
# add one via a function + an ACTIONS entry + an [[actions]] block.

# Run-level actions run once per poll, after publishing.
[[post_run]]
name = "notify"                # macOS Notification Center alert
enabled = false
trigger = "activity"           # activity (published>0 or failed>0 or listing error) | failure | always
title = "publish-video watcher"

[[post_run]]
name = "mytv"                  # auto-register into MyTV, one channel per platform (created if missing)
enabled = false
type = "vod_on_demand"
category = "saved"
channels = { youtube = "MyYoutube", bilibili = "MyBilibili" }

[[post_run]]
name = "summarize"             # analyze each published video with video-summarizer
enabled = false
command = "video-summarizer"   # absolute path recommended under launchd, e.g.
                               # /Users/you/Workspace/playground/video-summarizer/.venv/bin/video-summarizer
out = "~/video-analyses"       # where <slug>.md analyses are written (~ is expanded)
lang = ""                      # "" = auto-detect; or "zh", "en", …
visual = false                 # expensive Gemini Pro pass; run by hand instead
notify = true                  # one macOS notification per run listing the analyses written
